apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: notification-service
  labels:
    app.kubernetes.io/name: notification-service
data:
  NOTIF_REDIS_HOST: "redis"
  NOTIF_REDIS_PORT: "6379"
  NOTIF_REDIS_DB: "0"
  NOTIF_LOG_LEVEL: "INFO"
  NOTIF_POLL_INTERVAL: "1.0"
  NOTIF_BATCH_SIZE: "10"
  NOTIF_MAX_RETRIES: "3"
  NOTIF_SMTP_PORT: "587"
  NOTIF_SMTP_FROM: "noreply@example.com"
