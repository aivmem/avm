version: "3.8"

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - NOTIF_REDIS_HOST=redis
      - NOTIF_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/__pycache__

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
